<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<title> Log in page</title>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
		<link rel="stylesheet" href="style(login).css" type="text/css">
	</head>
	<body>
	<div class="columns">
		<div>
		<img src="logo-flash.png">
		</div>
		<div class="form-container">
		<form action="lenscope1.html" method="post">
		  <input type="text" name="name" placeholder="Full name" required>
		  <input type="email" name="email" placeholder="Email Address" required>
		  <input type="text" name="username" placeholder="Username" required>
		  <input type="password" name="password" placeholder="Password" required>
		  <input type="tel" name="number" placeholder="Phone number" required>
		  <center><select id="gender" name="gender">
		  <option value="male">Male</option>
		  <option value="female">Female</option>
		  <option value="other">Other</option>
		  </select>
		  <select id="forwho">
		  <option value="Photographer">Photographer</option>
		  <option value="Customer">Customer</option>
		  <select></center>
		  <center><input class="loginbutton" type="submit" value="Log in">
		  <hr>
		  <a href="log-in.html"><button type="button">Already have an account?</button></a>
		  </center>
		</form>
		</div>
		</div>
		<footer>
			<div>
				<p><i class="fa fa-facebook fa-2x"></i>
				  <i class="fa fa-instagram fa-2x"></i>
				  <i class="fa fa-twitter fa-2x"></i>
				  <i class="fa fa-flickr fa-2x"></i>
				
				Copyright 2023 Lenscope Student Project (CIT-3rd year). All rights reserved.</p>
			</div>
		</footer>
	</body>
</html>
